name: CI

permissions:
  contents: read

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
        
    - name: Install poetry
      run: pip install poetry

    - name: Setup a local virtual environment (if no poetry.toml file)
      run: |
        poetry config virtualenvs.create true --local
        poetry config virtualenvs.in-project true --local

    - uses: actions/cache@v5
      name: Define a cache for the virtual environment based on the dependencies lock file
      with:
        path: ./.venv
        key: venv-${{ hashFiles('poetry.lock') }}

    - name: Install dependencies
      run: poetry install

    - name: Check imports with isort
      run: poetry run isort . --check-only --diff

    - name: Check code formatting with Black
      run: poetry run black . --check

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        poetry run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        poetry run flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

    - name: Type checking with mypy
      run: poetry run mypy .

    - name: Run tests with pytest and coverage
      run: |
        poetry run pytest --cov=taskmanagement_app --cov-report=xml --cov-report=term-missing --junitxml=junit.xml -o junit_family=legacy --ignore=tests/e2e tests/

    - name: Build wheel
      if: success()
      run: poetry build -f wheel

    - name: Upload wheel artifact
      if: success()
      uses: actions/upload-artifact@v7
      with:
        name: wheel
        path: dist/*.whl
        if-no-files-found: error

    - name: Generate OpenAPI spec
      if: ${{ always() }}
      run: |
        poetry run python scripts/generate_openapi_json.py

    - name: Upload OpenAPI spec artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v7
      with:
        name: openapi-json
        path: openapi.json
        if-no-files-found: warn

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: brandstaetter/Taskmanagement-App
    
    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

  mutation-testing:
    name: Mutation Testing
    runs-on: ubuntu-latest
    needs: backend-checks

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install poetry
      run: pip install poetry

    - name: Setup a local virtual environment (if no poetry.toml file)
      run: |
        poetry config virtualenvs.create true --local
        poetry config virtualenvs.in-project true --local

    - uses: actions/cache@v5
      name: Define a cache for the virtual environment based on the dependencies lock file
      with:
        path: ./.venv
        key: venv-${{ hashFiles('poetry.lock') }}

    - name: Install dependencies
      run: poetry install

    - name: Run mutation testing with pytest-gremlins
      run: poetry run pytest --gremlins --gremlin-parallel --gremlin-cache --gremlin-report=html --gremlins-html-dir=mutation-report --ignore=tests/e2e tests/

    - name: Upload mutation testing report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: mutation-testing-report
        path: mutation-report/
        if-no-files-found: warn

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: backend-checks
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install poetry
      run: pip install poetry

    - name: Setup a local virtual environment (if no poetry.toml file)
      run: |
        poetry config virtualenvs.create true --local
        poetry config virtualenvs.in-project true --local

    - uses: actions/cache@v5
      name: Define a cache for the virtual environment based on the dependencies lock file
      with:
        path: ./.venv
        key: venv-${{ hashFiles('poetry.lock') }}

    - name: Install dependencies
      run: poetry install

    - name: Apply database migrations
      run: poetry run alembic upgrade head

    - name: Start FastAPI server
      run: |
        poetry run uvicorn taskmanagement_app.main:app --host 0.0.0.0 --port 8000 &
        echo $! > /tmp/uvicorn.pid

    - name: Wait for server readiness
      run: |
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8000/openapi.json > /dev/null 2>&1; then
            echo "Server is ready"
            exit 0
          fi
          echo "Waiting for server... ($i/30)"
          sleep 2
        done
        echo "Server failed to start within 60 seconds"
        exit 1

    - name: Run E2E tests
      run: poetry run pytest tests/e2e/ -v --tb=short

    - name: Stop FastAPI server
      if: always()
      run: |
        if [ -f /tmp/uvicorn.pid ]; then
          kill "$(cat /tmp/uvicorn.pid)" 2>/dev/null || true
          rm -f /tmp/uvicorn.pid
        fi
